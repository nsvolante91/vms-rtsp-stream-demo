<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>VMS Prototype — WebCodecs</title>
  <link rel="stylesheet" href="/src/ui/styles.css" />
</head>
<body>
  <div id="app">
    <div id="video-grid"></div>
    <div id="controls">
      <div class="control-group cg-layout">
        <button data-layout="1" class="layout-btn active">1×1</button>
        <button data-layout="2" class="layout-btn">2×2</button>
        <button data-layout="3" class="layout-btn">3×3</button>
        <button data-layout="4" class="layout-btn">4×4</button>
      </div>
      <div class="control-group cg-streams">
        <button id="btn-add-stream" title="Add stream">+</button>
        <button id="btn-remove-stream" title="Remove stream">−</button>
      </div>
      <div class="control-group cg-upscale">
        <select id="upscale-select" title="No upscaling — raw bilinear filtering">
          <option value="off">Off</option>
          <option value="cas">CAS</option>
          <option value="fsr">FSR</option>
          <option value="a4k">A4K</option>
          <option value="a4k-fast">A4K Fast</option>
          <option value="tsr">TSR</option>
          <option value="spec">SPEC</option>
          <option value="vqsr">VQSR</option>
          <option value="gen">GEN</option>
          <option value="dlss">DLSS</option>
        </select>
      </div>
      <div class="control-spacer"></div>
      <div class="control-group cg-toggles">
        <button id="btn-metrics-overlay" title="Toggle per-stream metrics overlay (M)">📊</button>
        <button id="btn-compare" title="Compare Mode — show original vs upscaled side by side">⚖️</button>
      </div>
      <button id="btn-overflow" class="btn-overflow" title="More actions">⋮</button>
      <button id="btn-fullscreen" class="btn-fullscreen" title="Toggle fullscreen">⛶</button>
      <div id="overflow-menu" class="overflow-menu hidden">
        <button class="overflow-item" id="btn-benchmark">▶ Run Benchmark</button>
        <button class="overflow-item" id="btn-export">📁 Export Metrics</button>
        <button class="overflow-item" id="btn-reset-metrics">↺ Reset Metrics</button>
        <div class="overflow-sep"></div>
        <button class="overflow-item" id="btn-cpu-hog" title="CPU Hogger — blocks main thread ~100ms every 1s">🌶️ CPU Hogger</button>
        <div class="overflow-sep"></div>
        <button class="overflow-item overflow-mobile-only" id="btn-metrics-overlay-mobile">📊 Metrics Overlay</button>
        <button class="overflow-item overflow-mobile-only" id="btn-compare-mobile">⚖️ Compare Mode</button>
        <div class="overflow-sep overflow-mobile-only"></div>
        <span class="overflow-hint">D — Dashboard</span>
        <span class="overflow-hint">M — Metrics overlay</span>
      </div>
    </div>
    <div id="dashboard" class="dashboard hidden"></div>
    <div id="error-overlay" class="error-overlay hidden"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
